# ─────────────────────────────────────────────────────────────────────────────
# configs.yaml — experiment matrix for the Kaggle benchmark.
#
# Format
# ------
# Each priority is one or more `groups`.  Every group is a cartesian product
# of (datasets × representations × models × da_methods).  The notebook expands
# all priority ≤ N groups into individual configs; run_one_config.py refuses
# any incompatible (model / da_method) or (representation / model) pair with
# a clean exit-code-2, so over-specified groups are safe.
#
# Seeds
# -----
# `seeds` is the default seed list.  A priority may override with its own
# `seeds:` list — used to give the deep branch 5 seeds (Wilcoxon-friendly
# at the seed-variance scale typical of neural training) while keeping the
# statistical branch at 3 seeds (training noise there is negligible).
#
# Five datasets are wired in.  To run only a subset, set DATASETS_FILTER
# in the notebook — no config edits required.
# ─────────────────────────────────────────────────────────────────────────────

seeds: [0, 1, 2]

priorities:

  1:
    description: >
      Statistical branch baselines on all five datasets — source-only +
      CORAL across every (representation × model) pair.  Covers the three
      core domain-shift signal modalities (vibration / audio / EEG) plus
      the two retained legacy benchmarks (ECG / sleep EEG) for direct
      comparability with earlier results.
    groups:
      # CWT excluded from stat branch: flattened scalograms (32×T) produce
      # 9k–96k features depending on dataset — intractable for trees,
      # and linear models lose the 2-D structure. CWT is reserved for
      # neural models (Priority 2) that can exploit the 2-D representation.
      - datasets:        [mitbih, sleep-edf, cwru, chbmit, mimii]
        representations: [raw, log-stft]
        models:          [logreg, random-forest, gbm]
        da_methods:      [source-only, coral]

  2:
    description: >
      Deep branch on the three new-modality datasets — every deep DA method
      paired with every (representation × neural-model) combination.  The
      compatibility matrix prunes incompatible pairs (e.g. raw × resnet2d)
      automatically.  5 seeds per (config) — Wilcoxon-friendly variance
      estimation at the seed-noise scale typical of neural training.
    seeds: [0, 1, 2, 3, 4]
    groups:
      - datasets:        [cwru, chbmit, mimii]
        representations: [raw, log-stft, cwt-morlet]
        models:          [inception-time, patch-tst, resnet2d]
        da_methods:      [source-only, deep-coral, codats, mk-mmd]

  3:
    description: >
      Completes the stat-branch DA matrix (adds subspace-alignment for all
      five datasets) and replays the deep branch on the retained legacy
      datasets (MIT-BIH + Sleep-EDF) for direct comparability with their
      earlier published tables.
    seeds: [0, 1, 2, 3, 4]
    groups:
      - datasets:        [mitbih, sleep-edf, cwru, chbmit, mimii]
        representations: [raw, log-stft, cwt-morlet]
        models:          [logreg, random-forest, gbm]
        da_methods:      [subspace-alignment]
      - datasets:        [mitbih, sleep-edf]
        representations: [raw, log-stft, cwt-morlet]
        models:          [inception-time, patch-tst, resnet2d]
        da_methods:      [source-only, deep-coral, codats, mk-mmd]
