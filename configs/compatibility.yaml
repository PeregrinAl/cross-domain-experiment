# Compatibility matrix: which (representation φ, model θ) pairs are valid.
#
# A pair is compatible when the model's expected input dimensionality matches
# the representation's output dimensionality:
#
#   1-D models  (InceptionTime1D, PatchTST)  ← φ that produce (N, T) or (N, C, T)
#   2-D models  (ResNet18_2D)                ← φ that produce (N, F, T) spectrograms
#
# Representation output shapes
# ----------------------------
# RawSignal   : (N, T)         → 1-D
# LogSTFT     : (N, F, T)      → 2-D
# CWT_Morlet  : (N, F, T)      → 2-D
#
# CARLA_SSL excluded — methodological decision (2026-05-18)
# ---------------------------------------------------------
# CARLA is an anomaly-detection SSL model (triplet loss: clean vs. synthetically
# corrupted signal).  Its training objective is semantically incompatible with
# the AF rhythm classification task: AF is a rhythm disorder, not a morphological
# anomaly, so the encoder learns no task-relevant features.  Additionally,
# transform() returns a flat (N, embed_dim) vector; passing this to temporal
# Conv1d models (InceptionTime1D, PatchTST) treats embedding dimensions as time
# steps — an architectural category error.  CARLA moved to experimental/.

compatibility:
  RawSignal:
    InceptionTime1D: true
    ResNet18_2D:     false   # ResNet2D needs 2-D (F, T) input
    PatchTST:        true

  LogSTFT:
    # LogSTFT produces (N, F, T).  ResNet18_2D treats it as an image.
    # InceptionTime1D and PatchTST treat the F frequency bins as independent
    # channels (multi-variate 1-D input), identical to multi-lead ECG.
    # This enables the representation × model crossing needed to disentangle
    # representation effects from architecture effects.
    InceptionTime1D: true
    ResNet18_2D:     true
    PatchTST:        true

  CWT_Morlet:
    # Same rationale as LogSTFT: F wavelet scales become channels.
    # MIMII × CWT_Morlet is already blocked by _PROHIBITIVE_COMBOS in
    # run_one_config.py (scalogram 32×16000 OOMs T4); this entry only
    # affects tractable datasets (CHB-MIT: 32×512, CWRU: 32×1024).
    InceptionTime1D: true
    ResNet18_2D:     true
    PatchTST:        true
