# Minimal smoke config — used by scripts/smoke_runner_e2e.py
# 1 dataset × 1 representation × 1 model × 1 method × 1 seed
# Designed to complete in ~30 s on CPU.

experiment_name: smoke_minimal
output_dir:      results/smoke/

n_bootstrap: 50          # fast bootstrap

screening:
  top_k:  1
  metric: delta_auc

random_search:
  n_trials:  1
  seeds:     [0]
  base_seed: 42

datasets:
  - smoke_ds

representations:
  - RawSignal

models:
  InceptionTime1D:
    epochs:     5
    lr:         1.0e-3
    batch_size: 32
    nb_filters: 16
    depth:      2

adaptation_methods:
  SourceOnly: {}
