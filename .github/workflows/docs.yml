name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "nstad_bench/**"          # re-deploy when API changes
      - ".github/workflows/docs.yml"
  workflow_dispatch:               # manual trigger

permissions:
  contents: write                  # gh-pages push

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0           # full history for git_commit_hash

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs dependencies
        run: |
          pip install --upgrade pip
          pip install \
            mkdocs \
            mkdocs-material \
            "mkdocstrings[python]" \
            mkdocs-gen-files \
            mkdocs-literate-nav

      - name: Install package (for mkdocstrings API extraction)
        run: pip install -e ".[dev]"

      - name: Build & deploy
        run: mkdocs gh-deploy --force --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
